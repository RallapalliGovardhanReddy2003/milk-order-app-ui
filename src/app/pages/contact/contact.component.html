<section class="contact-hero">

  <div class="contact-card">

    <h1>Contact Us 📞</h1>

    <p>Have questions? We'd love to hear from you!</p>

    <form (ngSubmit)="submit()">

      <input [(ngModel)]="contact.name" name="name" placeholder="Your Name" required>

      <input [(ngModel)]="contact.email" name="email" placeholder="Your Email" required>

      <textarea [(ngModel)]="contact.message" name="message" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>

    </form>

  </div>

</section>

<footer class="footer">

</footer>
