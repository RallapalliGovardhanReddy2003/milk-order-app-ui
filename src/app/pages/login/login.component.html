<h2>Login</h2>

<div *ngIf="message"
     [ngStyle]="{
       'background-color': isError ? '#f8d7da' : '#d4edda',
       'color': isError ? '#721c24' : '#155724',
       'padding': '10px',
       'border-radius': '5px',
       'margin-bottom': '10px'
     }">
  {{message}}
</div>

<form (ngSubmit)="login()">
  <input type="text" [(ngModel)]="username" name="username" placeholder="Username" required><br><br>
  <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required><br><br>
  <button type="submit">Login</button>
</form>
