<div class="modal-overlay" *ngIf="modalData">
  <div class="modal-box">

    <div class="modal-header">
      <h3>{{ modalData.title }}</h3>
      <button class="close-btn" (click)="close()">×</button>
    </div>

    <div class="modal-body">
      <p>{{ modalData.content }}</p>
    </div>

  </div>
</div>
